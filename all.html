<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全部作品 / 文章 / 工具 — Yan's Space</title>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { background: #ffffff; }
body {
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  background: #ffffff;
  color: #1a1a2e;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ========== Navigation (same as index.html) ========== */
nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  padding: 18px 50px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(16px) saturate(1.2);
  -webkit-backdrop-filter: blur(16px) saturate(1.2);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.nav-logo {
  font-size: 15px; font-weight: 700; letter-spacing: 3px;
  color: #1a1a2e; text-decoration: none; display: flex; align-items: center;
}
.nav-logo::before { content:'>'; font-weight:900; font-size:22px; line-height:1; color:#4facfe; margin-right:2px; }
.nav-links { display:flex; gap:36px; list-style:none; }
.nav-links a {
  font-size:13px; font-weight:500; color:rgba(26,26,46,0.45);
  text-decoration:none; letter-spacing:1.5px; transition:color 0.3s; position:relative;
}
.nav-links a::after {
  content:''; position:absolute; bottom:-4px; left:0; width:0; height:1.5px;
  background:#4facfe; transition:width 0.3s ease; border-radius:1px;
}
.nav-links a:hover { color:#1a1a2e; }
.nav-links a:hover::after { width:100%; }
.nav-links a.nav-admin {
  color: #4facfe;
  border: 1px solid rgba(79,172,254,0.5);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  margin-left: 8px;
  transition: all 0.3s;
}
.nav-links a.nav-admin::after { display: none; }
.nav-links a.nav-admin:hover {
  background: rgba(79,172,254,0.1);
  color: #4facfe;
}

/* ========== Layout ========== */
.page-body {
  display: flex; margin-top: 60px; min-height: calc(100vh - 60px);
}
.sidebar {
  width: 220px; min-width: 220px;
  padding: 48px 0 48px 50px;
  position: sticky; top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
  border-right: 1px solid rgba(0,0,0,0.05);
}
.sidebar-nav { list-style:none; display:flex; flex-direction:column; gap:4px; }
.sidebar-nav a {
  display: flex; align-items:center; gap:12px;
  padding: 11px 20px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  color: rgba(26,26,46,0.45); text-decoration:none;
  transition: all 0.25s;
}
.sidebar-nav a:hover { background:rgba(79,172,254,0.06); color:#1a1a2e; }
.sidebar-nav a.active { background:rgba(79,172,254,0.12); color:#4facfe; font-weight:600; }
.sidebar-nav a .nav-icon { font-size:18px; width:22px; text-align:center; }

.main-content {
  flex:1; padding: 48px 50px 80px;
  max-width: 960px;
}

/* ========== Tab Title ========== */
.tab-header {
  font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
  margin-bottom: 32px;
}
.tab-header .accent { color:#4facfe; }

/* ========== Grid ========== */
.content-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
  margin-bottom: 40px;
}
/* Tools: compact auto-fill */
.content-grid.tools-grid {
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 14px;
}
/* Articles: vertical stack of horizontal cards */
.content-grid.article-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
@media (max-width:600px) {
  .content-grid.tools-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
}
@media (max-width:768px) {
  .content-grid { grid-template-columns: 1fr; }
}

/* ========== Filter Bar (Tools) ========== */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 28px;
}
.filter-btn {
  padding: 6px 16px; border-radius: 20px;
  border: 1.5px solid rgba(0,0,0,0.08);
  background: #fff; color: rgba(26,26,46,0.5);
  font-size: 12.5px; font-weight: 600; letter-spacing: 0.3px;
  cursor: pointer; transition: all 0.25s;
}
.filter-btn:hover { border-color: rgba(79,172,254,0.3); color: #4facfe; }
.filter-btn.active {
  background: #1a1a2e; color: #fff;
  border-color: #1a1a2e;
}

/* ========== Tool Card (icon + name) ========== */
.tool-card-simple {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 16px;
  padding: 28px 16px 24px;
  transition: all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  cursor: pointer;
  text-decoration: none; color: inherit;
}
.tool-card-simple:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.07);
  border-color: rgba(79,172,254,0.25);
}
.tool-card-simple .tool-icon-wrap {
  width: 60px; height: 60px;
  border-radius: 16px;
  background: linear-gradient(135deg, #f8f9fb, #f0f2f5);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.tool-card-simple .tool-icon-wrap img {
  width: 36px; height: 36px; object-fit: contain;
}
.tool-card-simple .tool-icon-placeholder {
  font-size: 28px; line-height: 1;
}
.tool-card-simple .tool-name {
  font-size: 13px; font-weight: 600; color: #1a1a2e;
  text-align: center; line-height: 1.3;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 100%;
}

/* ========== Work/Article Card (grid) ========== */
.item-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.06);
  overflow: hidden;
  transition: all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  cursor: pointer;
  text-decoration: none; color: inherit; display: block;
}
.item-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.07);
  border-color: rgba(79,172,254,0.2);
}
.item-card-thumb {
  width:100%; height: 180px; overflow:hidden; background:#f0f2f5; position:relative;
}
.item-card-thumb img {
  width:100%; height:100%; object-fit:cover; transition: transform 0.5s;
}
.item-card:hover .item-card-thumb img { transform: scale(1.05); }
.item-card-thumb video {
  width:100%; height:100%; object-fit:cover;
}
.item-card-body { padding: 18px 20px 20px; }
.item-card-body h3 {
  font-size: 16px; font-weight: 700; color:#1a1a2e;
  line-height: 1.4; margin-bottom: 8px;
}
.item-card-body .item-desc {
  font-size: 13px; color:rgba(26,26,46,0.4); line-height:1.5;
  display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
.item-card-body .item-meta {
  font-size: 11px; color:rgba(26,26,46,0.25);
  font-family:'SF Mono','Consolas',monospace; letter-spacing:0.5px;
  margin-top: 10px;
}

/* ========== Article: Timeline ========== */
.timeline {
  position: relative;
  padding-left: 0;
  display: block;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 84px;
  top: 8px;
  bottom: 8px;
  width: 1px;
  background: rgba(0,0,0,0.08);
}
.timeline-item {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
  position: relative;
  text-decoration: none;
  color: inherit;
}
.timeline-item:last-child {
  margin-bottom: 0;
}
.timeline-date {
  width: 64px;
  min-width: 64px;
  text-align: right;
  font-size: 12px;
  font-weight: 600;
  color: rgba(26,26,46,0.35);
  font-family: 'SF Mono','Consolas',monospace;
  letter-spacing: 0.5px;
  padding-top: 14px;
}
.timeline-dot {
  position: absolute;
  left: 80px;
  top: 18px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid #4facfe;
  z-index: 1;
}
.timeline-content {
  flex: 1;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 14px;
  padding: 16px 22px;
  transition: all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}
.timeline-content:hover {
  transform: translateX(4px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  border-color: rgba(79,172,254,0.2);
}
.timeline-content h3 {
  font-size: 16px;
  font-weight: 700;
  color: #1a1a2e;
  line-height: 1.4;
  margin-bottom: 6px;
}
.timeline-content p {
  font-size: 13px;
  color: rgba(26,26,46,0.4);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
@media (max-width: 600px) {
  .timeline::before { left: 54px; }
  .timeline-item { gap: 14px; }
  .timeline-date { width: 44px; min-width: 44px; font-size: 11px; padding-top: 14px; }
  .timeline-dot { left: 50px; }
  .timeline-content { padding: 14px 16px; }
}

/* ========== Pagination ========== */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-top: 16px;
}
.pagination button {
  min-width: 38px; height: 38px;
  border: 1.5px solid rgba(0,0,0,0.08); border-radius: 10px;
  background: #fff; color: rgba(26,26,46,0.5);
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.25s;
  display: flex; align-items: center; justify-content: center;
}
.pagination button:hover { border-color:#4facfe; color:#4facfe; }
.pagination button.active { background:#1a1a2e; color:#fff; border-color:#1a1a2e; }
.pagination button:disabled { opacity:0.3; cursor:not-allowed; }
.pagination .page-ellipsis { color:rgba(26,26,46,0.2); font-size:13px; padding:0 4px; }

/* ========== Empty State ========== */
.empty-state {
  text-align:center; padding:80px 20px; color:rgba(26,26,46,0.25);
}
.empty-state .empty-icon { font-size:56px; margin-bottom:16px; opacity:0.4; }
.empty-state p { font-size:14px; }

/* ========== Loading ========== */
.loading-state { text-align:center; padding:60px 20px; color:rgba(26,26,46,0.25); font-size:14px; }

/* ========== Responsive ========== */
@media (max-width: 900px) {
  .page-body { flex-direction:column; }
  .sidebar {
    width:100%; min-width:unset;
    position:relative; top:0;
    height:auto;
    padding:20px 20px 0;
    border-right:none; border-bottom:1px solid rgba(0,0,0,0.05);
    overflow-x:auto;
  }
  .sidebar-nav { flex-direction:row; gap:4px; padding-bottom:12px; }
  .sidebar-nav a { padding:8px 14px; font-size:13px; white-space:nowrap; }
  .main-content { padding:32px 20px 60px; }
  nav { padding:14px 20px; }
  .nav-links { gap:20px; }
}
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="/" class="nav-logo">YAN<span style="color:#4facfe">.</span></a>
  <ul class="nav-links">
    <li><a href="/#works">作品</a></li>
    <li><a href="/#articles">文章</a></li>
    <li><a href="/#contact">联系</a></li>
    <li><a href="/admin.html" class="nav-admin" target="_blank">管理</a></li>
  </ul>
</nav>

<!-- Page Body -->
<div class="page-body">

  <!-- Left Sidebar -->
  <aside class="sidebar">
    <ul class="sidebar-nav">
      <li><a class="active" data-tab="works" onclick="switchTab('works', this)"><span class="nav-icon">★</span> 全部作品</a></li>
      <li><a data-tab="articles" onclick="switchTab('articles', this)"><span class="nav-icon">✎</span> 全部文章</a></li>
      <li><a data-tab="tools" onclick="switchTab('tools', this)"><span class="nav-icon">⚙</span> 常用工具</a></li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <h1 class="tab-header"><span class="accent" id="tabTitle">全部作品</span></h1>
    <div class="filter-bar" id="filterBar" style="display:none;"></div>
    <div class="content-grid" id="contentGrid"></div>
    <div class="pagination" id="pagination"></div>
    <div class="empty-state" id="emptyState" style="display:none;"></div>
    <div class="loading-state" id="loadingState" style="display:none;">加载中…</div>
  </main>

</div>

<script>
(function(){
  const PAGE_LIMIT = 12;

  // ── Protocol check ──
  if (location.protocol === 'file:') {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('emptyState').innerHTML = '<div class="empty-icon">⚠</div><p>请通过 http://localhost:3000/all.html 访问，不要直接双击打开文件</p>';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  let currentTab = 'works';
  let currentPage = 1;
  let totalPages = 1;

  // Tools: load all at once for client-side filtering
  let allTools = [];
  let currentToolCategory = 'all';

  const tabTitles = { works:'全部作品', articles:'全部文章', tools:'常用工具' };

  // ── Init ──
  function init() {
    const params = new URLSearchParams(location.search);
    const tab = params.get('tab') || 'works';
    currentTab = tab;
    document.querySelectorAll('.sidebar-nav a').forEach(a => {
      a.classList.toggle('active', a.dataset.tab === tab);
    });
    document.getElementById('tabTitle').textContent = tabTitles[tab] || tab;
    loadTab(tab, 1);
  }

  // ── Switch Tab ──
  window.switchTab = function(tab, el) {
    if (tab === currentTab) return;
    currentTab = tab;
    currentPage = 1;
    currentToolCategory = 'all';
    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
    if (el) el.classList.add('active');
    document.getElementById('tabTitle').textContent = tabTitles[tab] || tab;
    history.pushState(null, '', '?tab=' + tab);
    loadTab(tab, 1);
  };

  // ── Load Tab Data ──
  async function loadTab(tab, page) {
    const grid = document.getElementById('contentGrid');
    const filterBar = document.getElementById('filterBar');
    const emptyEl = document.getElementById('emptyState');
    const loadingEl = document.getElementById('loadingState');
    const pag = document.getElementById('pagination');

    // Reset display
    grid.style.display = 'none';
    filterBar.style.display = 'none';
    emptyEl.style.display = 'none';
    pag.innerHTML = '';
    loadingEl.style.display = 'block';

    try {
      if (tab === 'tools') {
        // Tools: load all at once
        if (allTools.length === 0) {
          const res = await fetch('/api/tools?limit=9999');
          const data = await res.json();
          allTools = data.items || data || [];
        }
        loadingEl.style.display = 'none';
        renderTools();
        return;
      }

      // Works / Articles: paginated
      const res = await fetch('/api/' + tab + '?page=' + page + '&limit=' + PAGE_LIMIT);
      const data = await res.json();
      loadingEl.style.display = 'none';

      const items = data.items || [];
      totalPages = data.totalPages || 1;
      currentPage = data.page || 1;

      if (items.length === 0 && currentPage === 1) {
        showEmpty(tab);
        return;
      }

      if (tab === 'articles') {
        // Articles: timeline
        grid.style.display = '';
        grid.className = 'content-grid timeline';
        grid.innerHTML = items.map(a => renderArticle(a)).join('');
        renderPagination(tab, currentPage, totalPages);
      } else {
        // Works: grid
        grid.style.display = '';
        grid.className = 'content-grid';
        grid.innerHTML = items.map(w => renderWork(w)).join('');
        renderPagination(tab, currentPage, totalPages);
      }
    } catch(e) {
      loadingEl.style.display = 'none';
      emptyEl.innerHTML = '<div class="empty-state"><p>加载失败，请确认服务已启动</p></div>';
      emptyEl.style.display = 'block';
    }
  }

  // ── Tools: render with filter ──
  function renderTools() {
    const grid = document.getElementById('contentGrid');
    const filterBar = document.getElementById('filterBar');
    grid.style.display = '';
    grid.className = 'content-grid tools-grid';
    document.getElementById('pagination').innerHTML = '';

    const filtered = currentToolCategory === 'all'
      ? allTools
      : allTools.filter(t => t.category === currentToolCategory);

    if (filtered.length === 0) {
      showEmpty('tools');
      return;
    }
    buildFilterBar(filterBar);
    grid.innerHTML = filtered.map(t => renderToolCard(t)).join('');
  }

  function buildFilterBar(bar) {
    const categories = [...new Set(allTools.map(t => t.category).filter(Boolean))];
    if (categories.length === 0) { bar.style.display = 'none'; return; }
    let html = '<button class="filter-btn ' + (currentToolCategory==='all'?'active':'') + '" onclick="filterByCategory(\'all\')">全部</button>';
    categories.forEach(cat => {
      const escCat = cat.replace(/'/g, "\\'");
      html += '<button class="filter-btn ' + (currentToolCategory===cat?'active':'') + '" onclick="filterByCategory(\'' + escCat + '\')">' + esc(cat) + '</button>';
    });
    bar.innerHTML = html;
    bar.style.display = '';
  }

  window.filterByCategory = function(cat) {
    currentToolCategory = cat;
    renderTools();
  };

  // ── Render: Work (grid card) ──
  function renderWork(w) {
    const isVideo = /\.(mp4|webm)$/i.test(w.image || '');
    let thumb = '';
    if (w.image) {
      if (isVideo) {
        thumb = '<div class="item-card-thumb"><video src="' + esc(w.image) + '" muted loop playsinline></video></div>';
      } else {
        thumb = '<div class="item-card-thumb"><img src="' + esc(w.image) + '" alt="" loading="lazy"></div>';
      }
    }
    const linkAttrs = w.link ? (' href="' + esc(w.link) + '" target="_blank" rel="noopener"') : '';
    return '<a class="item-card" ' + linkAttrs + '>'
      + thumb
      + '<div class="item-card-body">'
      + '<h3>' + esc(w.title) + '</h3>'
      + '<div class="item-desc">' + esc(w.description || '') + '</div>'
      + '</div></a>';
  }

  // ── Render: Article (timeline) ──
  function renderArticle(a) {
    const linkAttrs = a.link ? (' href="' + esc(a.link) + '" target="_blank" rel="noopener"') : '';
    return '<a class="timeline-item"' + linkAttrs + '>'
      + '<div class="timeline-date">' + esc(a.date || '') + '</div>'
      + '<div class="timeline-dot"></div>'
      + '<div class="timeline-content">'
      + '<h3>' + esc(a.title) + '</h3>'
      + '<p>' + esc(a.summary || '') + '</p>'
      + '</div></a>';
  }

  // ── Render: Tool (simple card: icon + name) ──
  function renderToolCard(t) {
    let iconHtml = '';
    if (t.icon) {
      iconHtml = '<div class="tool-icon-wrap"><img src="' + esc(t.icon) + '" alt=""></div>';
    } else {
      iconHtml = '<div class="tool-icon-wrap"><span class="tool-icon-placeholder">⚙</span></div>';
    }
    const linkAttrs = t.link ? (' href="' + esc(t.link) + '" target="_blank" rel="noopener"') : '';
    return '<a class="tool-card-simple" ' + linkAttrs + '>'
      + iconHtml
      + '<span class="tool-name">' + esc(t.name) + '</span>'
      + '</a>';
  }

  // ── Empty State ──
  function showEmpty(tab) {
    const msgs = {
      works: { icon:'★', text:'暂无作品' },
      articles: { icon:'✎', text:'暂无文章' },
      tools: { icon:'⚙', text:'暂无工具' },
    };
    const m = msgs[tab] || msgs.works;
    const el = document.getElementById('emptyState');
    el.innerHTML = '<div class="empty-icon">' + m.icon + '</div><p>' + m.text + '</p>';
    el.style.display = 'block';
  }

  // ── Pagination ──
  function renderPagination(tab, page, tPages) {
    if (tPages <= 1) return;
    const container = document.getElementById('pagination');
    let html = '';

    // Prev
    html += '<button ' + (page <= 1 ? 'disabled' : '') + ' onclick="goPage(' + (page-1) + ')">‹</button>';

    // Page numbers
    const range = getPageRange(page, tPages);
    range.forEach(p => {
      if (p === '...') {
        html += '<span class="page-ellipsis">…</span>';
      } else {
        html += '<button class="' + (p === page ? 'active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
      }
    });

    // Next
    html += '<button ' + (page >= tPages ? 'disabled' : '') + ' onclick="goPage(' + (page+1) + ')">›</button>';

    container.innerHTML = html;
  }

  function getPageRange(current, total) {
    if (total <= 7) return Array.from({length:total}, (_,i)=>i+1);
    const pages = [];
    if (current > 3) pages.push(1, '...');
    const start = Math.max(2, current - 1);
    const end = Math.min(total - 1, current + 1);
    for (let i = start; i <= end; i++) pages.push(i);
    if (current < total - 2) pages.push('...', total);
    // Deduplicate
    const seen = new Set();
    return pages.filter(p => {
      if (seen.has(p)) return false;
      seen.add(p);
      return true;
    });
  }

  window.goPage = function(page) {
    if (page < 1 || page > totalPages || page === currentPage) return;
    loadTab(currentTab, page);
  };

  // ── HTML Escape ──
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init on load ──
  init();

  // Handle browser back/forward
  window.addEventListener('popstate', function() {
    const params = new URLSearchParams(location.search);
    const tab = params.get('tab') || 'works';
    currentTab = tab;
    document.querySelectorAll('.sidebar-nav a').forEach(a => {
      a.classList.toggle('active', a.dataset.tab === tab);
    });
    document.getElementById('tabTitle').textContent = tabTitles[tab] || tab;
    loadTab(tab, 1);
  });
})();
</script>
</body>
</html>
