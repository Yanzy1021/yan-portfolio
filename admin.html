<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yan's Portfolio - 管理后台</title>
<style>
/* ========== Reset ========== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { background: #f8f9fb; }
body {
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  background: #f8f9fb;
  color: #1a1a2e;
  line-height: 1.6;
  min-height: 100vh;
}

/* ========== Login Page ========== */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ffffff;
}
.login-box {
  width: 100%;
  max-width: 380px;
  padding: 48px 36px;
  text-align: center;
}
.login-logo {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #1a1a2e;
  margin-bottom: 6px;
}
.login-logo span { color: #4facfe; }
.login-subtitle {
  font-size: 13px;
  color: rgba(26,26,46,0.35);
  margin-bottom: 36px;
  letter-spacing: 1px;
}
.login-field {
  margin-bottom: 16px;
  text-align: left;
}
.login-field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: rgba(26,26,46,0.5);
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.login-field input {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
  background: #fff;
}
.login-field input:focus { border-color: #4facfe; }
.login-btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: #1a1a2e;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.5px;
  margin-top: 8px;
}
.login-btn:hover {
  background: #2d2d4e;
  transform: translateY(-1px);
}
.login-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
.login-error {
  color: #e74c3c;
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
}

/* ========== Admin Layout ========== */
.admin-layout {
  display: none;
  min-height: 100vh;
}
.admin-layout.active { display: flex; }

/* Sidebar */
.admin-sidebar {
  width: 240px;
  background: #1a1a2e;
  color: #fff;
  padding: 28px 0;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}
.sidebar-logo {
  padding: 0 24px 28px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo span { color: #4facfe; }
.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  border-radius: 8px;
  font-size: 13.5px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  transition: all 0.25s;
  cursor: pointer;
}
.sidebar-nav a:hover { background: rgba(255,255,255,0.06); color: #fff; }
.sidebar-nav a.active {
  background: rgba(79,172,254,0.15);
  color: #4facfe;
}
.sidebar-nav a .nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.sidebar-footer a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  transition: all 0.25s;
  cursor: pointer;
}
.sidebar-footer a:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }

/* Main Content */
.admin-main {
  flex: 1;
  margin-left: 240px;
  padding: 32px 40px;
  min-height: 100vh;
}

/* Header */
.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}
.admin-header h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.admin-header h1 .accent { color: #4facfe; }
.admin-header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.admin-header-right a {
  font-size: 13px;
  color: rgba(26,26,46,0.45);
  text-decoration: none;
  transition: color 0.3s;
}
.admin-header-right a:hover { color: #4facfe; }

/* Content Panel */
.admin-panel {
  display: none;
}
.admin-panel.active { display: block; }

/* Cards Grid */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 24px;
}
.data-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.06);
  padding: 20px;
  transition: all 0.3s;
}
.data-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}
.data-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
}
.data-card-header h3 {
  font-size: 15px;
  font-weight: 600;
  color: #1a1a2e;
  line-height: 1.4;
  flex: 1;
}
.data-card-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.data-card-actions button {
  width: 30px; height: 30px;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,0.08);
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: all 0.2s;
  color: rgba(26,26,46,0.5);
}
.data-card-actions button:hover {
  background: rgba(79,172,254,0.08);
  border-color: rgba(79,172,254,0.3);
  color: #4facfe;
}
.data-card-actions button.btn-delete:hover {
  background: rgba(231,76,60,0.08);
  border-color: rgba(231,76,60,0.3);
  color: #e74c3c;
}
.data-card-meta {
  font-size: 11px;
  color: rgba(26,26,46,0.3);
  font-family: 'SF Mono', 'Consolas', monospace;
  letter-spacing: 0.5px;
}
.data-card-desc {
  font-size: 13px;
  color: rgba(26,26,46,0.45);
  line-height: 1.5;
  margin-top: 8px;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: rgba(26,26,46,0.25);
}
.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}
.empty-state p {
  font-size: 14px;
  margin-bottom: 20px;
}

/* Add Button */
.btn-add {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 22px;
  border: none;
  border-radius: 10px;
  background: #1a1a2e;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-add:hover {
  background: #2d2d4e;
  transform: translateY(-1px);
}

/* ========== Modal ========== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 18px;
  width: 100%;
  max-width: 520px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 24px;
  letter-spacing: -0.3px;
}
.modal-close {
  float: right;
  width: 32px; height: 32px;
  border: none;
  background: rgba(0,0,0,0.05);
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  color: rgba(26,26,46,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { background: rgba(0,0,0,0.1); }
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: rgba(26,26,46,0.5);
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
  font-family: inherit;
}
.form-group input:focus,
.form-group textarea:focus { border-color: #4facfe; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 24px;
}
.btn-cancel {
  padding: 10px 20px;
  border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 8px;
  background: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-cancel:hover { border-color: rgba(0,0,0,0.2); }
.btn-submit {
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  background: #1a1a2e;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-submit:hover { background: #2d2d4e; }

/* ========== Contact Section ========== */
.contact-form {
  max-width: 520px;
}
.contact-item-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: #fff;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.06);
  margin-bottom: 12px;
}
.contact-item-row .ci-label {
  font-size: 14px;
  font-weight: 600;
  min-width: 100px;
}
.contact-item-row .ci-value {
  font-size: 13px;
  color: rgba(26,26,46,0.5);
  flex: 1;
}
.contact-item-row input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 6px;
  font-size: 13px;
  outline: none;
}
.contact-item-row input:focus { border-color: #4facfe; }

/* ========== Toast ========== */
.toast {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 2000;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }

/* ========== Password Change ========== */
.password-section {
  max-width: 420px;
}
.password-section .form-group { margin-bottom: 16px; }

/* ========== Upload Zone ========== */
.upload-zone {
  border: 2px dashed rgba(0,0,0,0.12);
  border-radius: 10px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: #fafbfc;
  position: relative;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: #4facfe;
  background: rgba(79,172,254,0.04);
}
.upload-zone.has-file {
  border-style: solid;
  border-color: rgba(0,0,0,0.08);
  padding: 8px;
  background: #fff;
}
.upload-zone .upload-icon {
  font-size: 28px;
  color: rgba(26,26,46,0.2);
}
.upload-zone .upload-text {
  font-size: 13px;
  color: rgba(26,26,46,0.35);
}
.upload-zone .upload-text strong {
  color: #4facfe;
}
.upload-zone .upload-hint {
  font-size: 11px;
  color: rgba(26,26,46,0.2);
}
.upload-zone .upload-preview {
  max-width: 100%;
  max-height: 200px;
  border-radius: 6px;
  display: none;
}
.upload-zone.has-file .upload-preview {
  display: block;
}
.upload-zone.has-file .upload-icon,
.upload-zone.has-file .upload-text,
.upload-zone.has-file .upload-hint {
  display: none;
}
.upload-zone .upload-remove {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.upload-zone.has-file .upload-remove {
  display: flex;
}
.upload-zone .upload-remove:hover {
  background: rgba(231,76,60,0.8);
}
.upload-zone .upload-loading {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  z-index: 1;
}
.upload-zone.uploading .upload-loading {
  display: flex;
}
.upload-spinner {
  width: 24px;
  height: 24px;
  border: 3px solid rgba(0,0,0,0.1);
  border-top-color: #4facfe;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* QR Upload (smaller, inline) */
.qr-upload-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: #fff;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.06);
  margin-bottom: 12px;
}
.qr-upload-row .ci-label {
  font-size: 14px;
  font-weight: 600;
  min-width: 100px;
}
.qr-upload-row .ci-value {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
}
.qr-upload-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 8px;
  background: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(26,26,46,0.6);
}
.qr-upload-btn:hover {
  border-color: #4facfe;
  color: #4facfe;
}
.qr-preview {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  object-fit: cover;
  border: 1px solid rgba(0,0,0,0.06);
  display: none;
}
.qr-preview.show { display: block; }
.qr-no-img {
  font-size: 12px;
  color: rgba(26,26,46,0.25);
}

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .admin-sidebar {
    width: 100%;
    position: relative;
    padding: 16px 0;
  }
  .admin-layout.active { flex-direction: column; }
  .admin-main { margin-left: 0; padding: 20px; }
  .sidebar-nav { flex-direction: row; overflow-x: auto; padding: 8px 12px; }
  .sidebar-footer { display: none; }
  .data-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}

/* Image preview in card */
.data-card-thumb {
  width: 100%;
  height: 140px;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 12px;
  background: #f0f2f5;
}
.data-card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: #fff;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.06);
  padding: 18px 20px;
}
.stat-card .stat-num {
  font-size: 28px;
  font-weight: 700;
  color: #1a1a2e;
}
.stat-card .stat-label {
  font-size: 12px;
  color: rgba(26,26,46,0.35);
  margin-top: 4px;
  letter-spacing: 0.5px;
}

@media (max-width: 768px) {
  .stats-bar { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ========== Login Page ========== -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">YAN<span>.</span></div>
    <p class="login-subtitle">MANAGEMENT CONSOLE</p>
    <div class="login-field">
      <label>账号</label>
      <input type="text" id="loginUsername" placeholder="请输入管理员账号" autocomplete="username">
    </div>
    <div class="login-field">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ========== Admin Layout ========== -->
<div class="admin-layout" id="adminLayout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">YAN<span>.</span> Admin</div>
    <nav class="sidebar-nav">
      <a class="active" data-panel="dashboard" onclick="switchPanel('dashboard', this)">
        <span class="nav-icon">&#9632;</span> 概览
      </a>
      <a data-panel="works" onclick="switchPanel('works', this)">
        <span class="nav-icon">&#9733;</span> 作品集
      </a>
      <a data-panel="articles" onclick="switchPanel('articles', this)">
        <span class="nav-icon">&#9998;</span> 文章 / 笔记
      </a>
      <a data-panel="tools" onclick="switchPanel('tools', this)">
        <span class="nav-icon">&#128295;</span> 常用工具
      </a>
      <a data-panel="avatar" onclick="switchPanel('avatar', this)">
        <span class="nav-icon">&#129302;</span> 数字分身
      </a>
      <a data-panel="contact" onclick="switchPanel('contact', this)">
        <span class="nav-icon">&#9993;</span> 联系方式
      </a>
      <a data-panel="password" onclick="switchPanel('password', this)">
        <span class="nav-icon">&#9919;</span> 修改密码
      </a>
    </nav>
    <div class="sidebar-footer">
      <a onclick="doLogout()"><span class="nav-icon">&#10006;</span> 退出登录</a>
      <a href="/" target="_blank"><span class="nav-icon">&#8599;</span> 查看主站</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">

    <!-- Header -->
    <div class="admin-header">
      <h1 id="panelTitle">管理<span class="accent">概览</span></h1>
      <div class="admin-header-right">
        <a href="/" target="_blank">返回主站</a>
      </div>
    </div>

    <!-- Dashboard Panel -->
    <div class="admin-panel active" id="panel-dashboard">
      <div class="stats-bar" id="statsBar">
        <div class="stat-card"><div class="stat-num" id="statWorks">0</div><div class="stat-label">作品数</div></div>
        <div class="stat-card"><div class="stat-num" id="statArticles">0</div><div class="stat-label">文章数</div></div>
        <div class="stat-card"><div class="stat-num" id="statTools">0</div><div class="stat-label">工具数</div></div>
        <div class="stat-card"><div class="stat-num">v2.0.0</div><div class="stat-label">当前版本</div></div>
      </div>
      <p style="color:rgba(26,26,46,0.35);font-size:13px;">通过左侧菜单管理你的作品集、文章和联系方式。</p>
    </div>

    <!-- Works Panel -->
    <div class="admin-panel" id="panel-works">
      <button class="btn-add" onclick="openWorkModal()">+ 新增作品</button>
      <div class="data-grid" id="worksGrid" style="margin-top:20px;"></div>
    </div>

    <!-- Articles Panel -->
    <div class="admin-panel" id="panel-articles">
      <button class="btn-add" onclick="openArticleModal()">+ 新增文章</button>
      <div class="data-grid" id="articlesGrid" style="margin-top:20px;"></div>
    </div>

    <!-- Tools Panel -->
    <div class="admin-panel" id="panel-tools">
      <button class="btn-add" onclick="openToolModal()">+ 新增工具</button>
      <div class="data-grid" id="toolsGrid" style="margin-top:20px;"></div>
    </div>

    <!-- Avatar (Digital Clone) Panel -->
    <div class="admin-panel" id="panel-avatar">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;">
        <div class="form-group">
          <label>分身名称</label>
          <input type="text" id="avatarName" placeholder="如：Yan的数字分身">
        </div>
        <div class="form-group">
          <label>状态文案</label>
          <input type="text" id="avatarStatus" placeholder="如：在线">
        </div>
      </div>
      <div class="form-group">
        <label>头像图片 URL</label>
        <input type="text" id="avatarImage" placeholder="如：avatar.png 或 /uploads/xxx.png">
      </div>
      <div class="form-group">
        <label>欢迎语</label>
        <input type="text" id="avatarWelcome" placeholder="用户点开聊天面板看到的第一句话">
      </div>
      <div style="margin-top:20px;">
        <button class="btn-submit" onclick="saveAvatarConfig()">保存基础配置</button>
      </div>
      <hr style="border:none;border-top:1px solid rgba(0,0,0,0.06);margin:32px 0;">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:6px;">预设话术列表</h3>
      <p style="font-size:12.5px;color:rgba(26,26,46,0.35);margin-bottom:16px;">访客发送消息后，分身会从中随机选取一条回复。</p>
      <div id="responsesList" style="display:flex;flex-direction:column;gap:8px;"></div>
      <div style="display:flex;gap:10px;margin-top:16px;align-items:center;">
        <input type="text" id="newResponseInput" placeholder="输入一条预设话术..." style="flex:1;padding:10px 14px;border:1.5px solid rgba(0,0,0,0.1);border-radius:10px;font-size:13px;outline:none;">
        <button class="btn-add" onclick="addResponse()" style="margin:0;">+ 添加</button>
      </div>
      <hr style="border:none;border-top:1px solid rgba(0,0,0,0.06);margin:32px 0;">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:6px;">快捷回复按钮</h3>
      <p style="font-size:12.5px;color:rgba(26,26,46,0.35);margin-bottom:16px;">在聊天输入框上方显示的标签按钮，点击直接发送。</p>
      <div id="quickRepliesList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="text" id="newQuickReplyInput" placeholder="输入快捷回复文字..." style="flex:1;padding:10px 14px;border:1.5px solid rgba(0,0,0,0.1);border-radius:10px;font-size:13px;outline:none;">
        <button class="btn-add" onclick="addQuickReply()" style="margin:0;">+ 添加</button>
      </div>
    </div>

    <!-- Contact Panel -->
    <div class="admin-panel" id="panel-contact">
      <div class="contact-form" id="contactForm"></div>
      <div style="margin-top:20px;">
        <button class="btn-submit" onclick="saveContact()">保存联系方式</button>
      </div>
    </div>

    <!-- Password Panel -->
    <div class="admin-panel" id="panel-password">
      <div class="password-section">
        <div class="form-group">
          <label>当前密码</label>
          <input type="password" id="oldPwd" placeholder="请输入当前密码">
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="newPwd" placeholder="至少 6 位">
        </div>
        <div class="form-group">
          <label>确认新密码</label>
          <input type="password" id="confirmPwd" placeholder="再次输入新密码">
        </div>
        <button class="btn-submit" onclick="changePassword()">修改密码</button>
      </div>
    </div>

  </main>
</div>

<!-- ========== Modal ========== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-title" id="modalTitle">新增</div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ========== Toast ========== -->
<div class="toast" id="toast"></div>

<!-- ========== Scripts ========== -->
<script>
(function() {
  const API = '';

  // ── Protocol check: file:// 无法请求 API ──
  if (location.protocol === 'file:') {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('loginError').textContent = '请通过 http://localhost:3000/admin.html 访问，不要直接双击打开文件';
    document.getElementById('loginBtn').style.display = 'none';
  }

  // ── Helpers ──
  function getToken() {
    return localStorage.getItem('admin_token');
  }

  function setToken(t) {
    localStorage.setItem('admin_token', t);
  }

  function clearToken() {
    localStorage.removeItem('admin_token');
  }

  // ── 401 自动跳转登录 ──
  function handleUnauthorized() {
    clearToken();
    document.getElementById('adminLayout').classList.remove('active');
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    showToast('登录已过期，请重新登录', 'error');
  }

  async function api(method, url, data) {
    const opts = {
      method: method,
      headers: { 'Content-Type': 'application/json' }
    };
    if (getToken()) {
      opts.headers['Authorization'] = 'Bearer ' + getToken();
    }
    if (data) opts.body = JSON.stringify(data);
    const res = await fetch(API + url, opts);
    if (res.status === 401 && url !== '/api/login') {
      handleUnauthorized();
      throw new Error('未登录或登录已过期');
    }
    return res.json();
  }

  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    setTimeout(() => { el.className = 'toast'; }, 2500);
  }

  // ── Login ──
  window.doLogin = async function() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = '登录中...';
    try {
      const res = await api('POST', '/api/login', { username, password });
      if (res.error) {
        errEl.textContent = res.error;
      } else {
        setToken(res.token);
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('adminLayout').classList.add('active');
        loadAll();
      }
    } catch(e) {
      errEl.textContent = '网络错误，请确认服务已启动';
    }
    btn.disabled = false;
    btn.textContent = '登 录';
  };

  // Enter key to login
  document.getElementById('loginPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') window.doLogin();
  });
  document.getElementById('loginUsername').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('loginPassword').focus();
  });

  // ── Logout ──
  window.doLogout = async function() {
    try { await api('POST', '/api/logout'); } catch(e) {}
    clearToken();
    document.getElementById('adminLayout').classList.remove('active');
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginError').textContent = '';
  };

  // ── Panel Switch ──
  window.switchPanel = function(name, el) {
    document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if (el) el.classList.add('active');
    const titles = { dashboard: '管理概览', works: '作品集管理', articles: '文章/笔记管理', tools: '常用工具管理', avatar: '数字分身管理', contact: '联系方式管理', password: '修改密码' };
    document.getElementById('panelTitle').innerHTML = titles[name] || name;
    // 切换面板时刷新对应数据
    if (name === 'works') loadWorks();
    else if (name === 'articles') loadArticles();
    else if (name === 'tools') loadTools();
    else if (name === 'avatar') loadAvatar();
    else if (name === 'contact') loadContact();
    else if (name === 'dashboard') loadStats();
  };

  // ── Load All Data ──
  async function loadAll() {
    loadWorks();
    loadArticles();
    loadTools();
    loadAvatar();
    loadContact();
    loadStats();
  }

  async function loadStats() {
    try {
      const [works, articles, tools] = await Promise.all([
        api('GET', '/api/works'),
        api('GET', '/api/articles'),
        api('GET', '/api/tools')
      ]);
      document.getElementById('statWorks').textContent = (works || []).length;
      document.getElementById('statArticles').textContent = (articles || []).length;
      document.getElementById('statTools').textContent = (tools || []).length;
    } catch(e) {}
  }

  // ── Works CRUD ──
  async function loadWorks() {
    const grid = document.getElementById('worksGrid');
    try {
      const works = await api('GET', '/api/works');
      if (!works || works.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9733;</div><p>暂无作品，点击上方按钮新增</p></div>';
        return;
      }
      grid.innerHTML = works.map(w => {
        const isVideo = /\.(mp4|webm)$/i.test(w.image || '');
        let thumb = '';
        if (w.image) {
          if (isVideo) {
            thumb = '<div class="data-card-thumb"><video src="' + escHtml(w.image) + '" muted loop playsinline style="width:100%;height:100%;object-fit:cover;" onmouseenter="this.play()" onmouseleave="this.pause()"></video></div>';
          } else {
            thumb = '<div class="data-card-thumb"><img src="' + escHtml(w.image) + '" alt=""></div>';
          }
        }
        return '<div class="data-card">' + thumb
          + '<div class="data-card-header">'
          + '<h3>' + escHtml(w.title) + '</h3>'
          + '<div class="data-card-actions">'
          + '<button class="btn-edit" onclick="editWork(\'' + w.id + '\')" title="编辑">&#9998;</button>'
          + '<button class="btn-delete" onclick="deleteWork(\'' + w.id + '\')" title="删除">&#10006;</button>'
          + '</div></div>'
          + '<div class="data-card-desc">' + escHtml(w.description) + '</div>'
          + (w.link ? '<div class="data-card-meta" style="margin-top:8px;">' + escHtml(w.link) + '</div>' : '')
          + '</div>';
      }).join('');
    } catch(e) {
      grid.innerHTML = '<div class="empty-state"><p>加载失败，请确认服务已启动</p></div>';
    }
  }
  window.loadWorks = loadWorks;

  let editingWorkId = null;
  let workUploadedUrl = '';
  window.openWorkModal = function(id) {
    editingWorkId = id || null;
    workUploadedUrl = '';
    const title = id ? '编辑作品' : '新增作品';
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = `
      <div class="form-group"><label>标题</label><input id="mWorkTitle" placeholder="作品标题"></div>
      <div class="form-group"><label>描述</label><textarea id="mWorkDesc" placeholder="作品描述"></textarea></div>
      <div class="form-group">
        <label>封面图片 / 视频</label>
        <div class="upload-zone" id="workUploadZone">
          <input type="file" id="workFileInput" accept="image/*,video/*" style="display:none;">
          <div class="upload-icon">&#8679;</div>
          <div class="upload-text">拖拽文件到此处，或 <strong>点击上传</strong></div>
          <div class="upload-hint">支持 JPG、PNG、GIF、WebP、MP4、WebM（最大 10MB）</div>
          <img class="upload-preview" id="workPreview" alt="">
          <video class="upload-preview" id="workVideoPreview" style="display:none;" muted loop playsinline></video>
          <button class="upload-remove" id="workUploadRemove" onclick="removeWorkUpload(event)">&times;</button>
          <div class="upload-loading"><div class="upload-spinner"></div></div>
        </div>
      </div>
      <div class="form-group">
        <label>或粘贴图片 / 视频链接</label>
        <input type="text" id="mWorkImageUrl" placeholder="https://example.com/image.jpg（粘贴图片链接，可替代文件上传）" style="width:100%;padding:8px 12px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;font-size:13px;">
        <div style="font-size:11px;color:rgba(0,0,0,0.4);margin-top:4px;">推荐图床：imgbb.com（免费）｜ 粘贴后封面将使用此链接</div>
      </div>
      <div class="form-group"><label>链接</label><input id="mWorkLink" placeholder="作品链接（可选）"></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-submit" onclick="saveWork()">保存</button>
      </div>
    `;

    // Bind upload events
    const zone = document.getElementById('workUploadZone');
    const fileInput = document.getElementById('workFileInput');

    zone.addEventListener('click', function(e) {
      if (e.target.closest('.upload-remove')) return;
      fileInput.click();
    });

    zone.addEventListener('dragover', function(e) {
      e.preventDefault();
      zone.classList.add('dragover');
    });
    zone.addEventListener('dragleave', function() {
      zone.classList.remove('dragover');
    });
    zone.addEventListener('drop', function(e) {
      e.preventDefault();
      zone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        handleWorkFile(e.dataTransfer.files[0]);
      }
    });
    fileInput.addEventListener('change', function() {
      if (fileInput.files.length > 0) {
        handleWorkFile(fileInput.files[0]);
      }
    });

    if (id) {
      api('GET', '/api/works').then(works => {
        const w = works.find(x => x.id === id);
        if (w) {
          document.getElementById('mWorkTitle').value = w.title || '';
          document.getElementById('mWorkDesc').value = w.description || '';
          document.getElementById('mWorkImageUrl').value = w.image || '';
          document.getElementById('mWorkLink').value = w.link || '';
          if (w.image) {
            workUploadedUrl = w.image;
            showWorkPreview(w.image);
          }
        }
      });
    }
    document.getElementById('modalOverlay').classList.add('active');
  };

  window.editWork = function(id) { openWorkModal(id); };

  window.saveWork = async function() {
    const imgUrl = document.getElementById('mWorkImageUrl').value.trim();
    const data = {
      title: document.getElementById('mWorkTitle').value.trim(),
      description: document.getElementById('mWorkDesc').value.trim(),
      image: workUploadedUrl || imgUrl || '',
      link: document.getElementById('mWorkLink').value.trim()
    };
    if (!data.title) { showToast('请输入标题', 'error'); return; }
    try {
      if (editingWorkId) {
        await api('PUT', '/api/works?id=' + editingWorkId, data);
        showToast('作品已更新', 'success');
      } else {
        await api('POST', '/api/works', data);
        showToast('作品已添加', 'success');
      }
      closeModal();
      loadWorks();
      loadStats();
    } catch(e) {
      showToast('保存失败', 'error');
    }
  };

  window.deleteWork = async function(id) {
    if (!confirm('确定删除这个作品吗？')) return;
    try {
      await api('DELETE', '/api/works?id=' + id);
      showToast('已删除', 'success');
      loadWorks();
      loadStats();
    } catch(e) {
      showToast('删除失败', 'error');
    }
  };

  // ── Articles CRUD ──
  async function loadArticles() {
    const grid = document.getElementById('articlesGrid');
    try {
      const articles = await api('GET', '/api/articles');
      if (!articles || articles.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9998;</div><p>暂无文章，点击上方按钮新增</p></div>';
        return;
      }
      grid.innerHTML = articles.map(a => {
        let thumb = '';
        if (a.image) {
          thumb = '<div class="data-card-thumb"><img src="' + escHtml(a.image) + '" alt=""></div>';
        }
        return '<div class="data-card">' + thumb
          + '<div class="data-card-header">'
          + '<h3>' + escHtml(a.title) + '</h3>'
          + '<div class="data-card-actions">'
          + '<button class="btn-edit" onclick="editArticle(\'' + a.id + '\')" title="编辑">&#9998;</button>'
          + '<button class="btn-delete" onclick="deleteArticle(\'' + a.id + '\')" title="删除">&#10006;</button>'
          + '</div></div>'
          + '<div class="data-card-meta">' + escHtml(a.date || '') + '</div>'
          + '<div class="data-card-desc">' + escHtml(a.summary || '') + '</div>'
          + (a.link ? '<div class="data-card-meta" style="margin-top:8px;">' + escHtml(a.link) + '</div>' : '')
          + '</div>';
      }).join('');
    } catch(e) {
      grid.innerHTML = '<div class="empty-state"><p>加载失败，请确认服务已启动</p></div>';
    }
  }
  window.loadArticles = loadArticles;

  let editingArticleId = null;
  let articleUploadedUrl = '';
  window.openArticleModal = function(id) {
    editingArticleId = id || null;
    articleUploadedUrl = '';
    const title = id ? '编辑文章' : '新增文章';
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = `
      <div class="form-group"><label>标题</label><input id="mArtTitle" placeholder="文章标题"></div>
      <div class="form-group"><label>描述</label><textarea id="mArtSummary" placeholder="文章摘要/描述"></textarea></div>
      <div class="form-group">
        <label>封面图片</label>
        <div class="upload-zone" id="articleUploadZone">
          <input type="file" id="articleFileInput" accept="image/*" style="display:none;">
          <div class="upload-icon">&#8679;</div>
          <div class="upload-text">拖拽图片到此处，或 <strong>点击上传</strong></div>
          <div class="upload-hint">支持 JPG、PNG、GIF、WebP（最大 10MB）</div>
          <img class="upload-preview" id="articlePreview" alt="">
          <button class="upload-remove" id="articleUploadRemove" onclick="removeArticleUpload(event)">&times;</button>
          <div class="upload-loading"><div class="upload-spinner"></div></div>
        </div>
      </div>
      <div class="form-group">
        <label>或粘贴图片链接</label>
        <input type="text" id="mArtImageUrl" placeholder="https://example.com/image.jpg（粘贴图片链接，可替代文件上传）" style="width:100%;padding:8px 12px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;font-size:13px;">
        <div style="font-size:11px;color:rgba(0,0,0,0.4);margin-top:4px;">推荐图床：imgbb.com（免费）｜ 粘贴后封面将使用此链接</div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>发布日期</label><input type="date" id="mArtDate"></div>
        <div class="form-group"><label>链接</label><input id="mArtLink" placeholder="文章链接（可选）"></div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-submit" onclick="saveArticle()">保存</button>
      </div>
    `;

    // Bind upload events
    const zone = document.getElementById('articleUploadZone');
    const fileInput = document.getElementById('articleFileInput');

    zone.addEventListener('click', function(e) {
      if (e.target.closest('.upload-remove')) return;
      fileInput.click();
    });
    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); zone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleArticleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', function() {
      if (fileInput.files.length > 0) handleArticleFile(fileInput.files[0]);
    });

    if (id) {
      api('GET', '/api/articles').then(articles => {
        const a = articles.find(x => x.id === id);
        if (a) {
          document.getElementById('mArtTitle').value = a.title || '';
          document.getElementById('mArtSummary').value = a.summary || '';
          document.getElementById('mArtImageUrl').value = a.image || '';
          document.getElementById('mArtDate').value = (a.date || '').replace(/\./g, '-');
          document.getElementById('mArtLink').value = a.link || '';
          if (a.image) {
            articleUploadedUrl = a.image;
            showArticlePreview(a.image);
          }
        }
      });
    }
    document.getElementById('modalOverlay').classList.add('active');
  };

  window.editArticle = function(id) { openArticleModal(id); };

  window.saveArticle = async function() {
    const imgUrl = document.getElementById('mArtImageUrl').value.trim();
    const data = {
      title: document.getElementById('mArtTitle').value.trim(),
      summary: document.getElementById('mArtSummary').value.trim(),
      image: articleUploadedUrl || imgUrl || '',
      date: (document.getElementById('mArtDate').value || '').replace(/-/g, '.'),
      link: document.getElementById('mArtLink').value.trim()
    };
    if (!data.title) { showToast('请输入标题', 'error'); return; }
    try {
      if (editingArticleId) {
        await api('PUT', '/api/articles?id=' + editingArticleId, data);
        showToast('文章已更新', 'success');
      } else {
        await api('POST', '/api/articles', data);
        showToast('文章已添加', 'success');
      }
      closeModal();
      loadArticles();
      loadStats();
    } catch(e) {
      showToast('保存失败', 'error');
    }
  };

  window.deleteArticle = async function(id) {
    if (!confirm('确定删除这篇文章吗？')) return;
    try {
      await api('DELETE', '/api/articles?id=' + id);
      showToast('已删除', 'success');
      loadArticles();
      loadStats();
    } catch(e) {
      showToast('删除失败', 'error');
    }
  };

  // ── Tools CRUD ──
  async function loadTools() {
    const grid = document.getElementById('toolsGrid');
    try {
      const tools = await api('GET', '/api/tools');
      if (!tools || tools.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⚙</div><p>暂无工具，点击上方按钮新增</p></div>';
        return;
      }
      grid.innerHTML = tools.map(t => {
        let thumb = '';
        if (t.icon) {
          thumb = '<div class="data-card-thumb"><img src="' + escHtml(t.icon) + '" alt="" style="object-fit:contain;padding:8px;"></div>';
        }
        return '<div class="data-card">' + thumb
          + '<div class="data-card-header">'
          + '<h3>' + escHtml(t.name) + '</h3>'
          + '<div class="data-card-actions">'
          + '<button class="btn-edit" onclick="editTool(\'' + t.id + '\')" title="编辑">&#9998;</button>'
          + '<button class="btn-delete" onclick="deleteTool(\'' + t.id + '\')" title="删除">&#10006;</button>'
          + '</div></div>'
          + (t.category ? '<div class="data-card-meta">' + escHtml(t.category) + '</div>' : '')
          + '</div>';
      }).join('');
    } catch(e) {
      grid.innerHTML = '<div class="empty-state"><p>加载失败，请确认服务已启动</p></div>';
    }
  }
  window.loadTools = loadTools;

  let editingToolId = null;
  let toolUploadedUrl = '';
  window.openToolModal = function(id) {
    editingToolId = id || null;
    toolUploadedUrl = '';
    const title = id ? '编辑工具' : '新增工具';
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = `
      <div class="form-group"><label>名称</label><input id="mToolName" placeholder="工具名称"></div>
      <div class="form-group"><label>分类标签</label><input id="mToolCategory" placeholder="如：设计工具 / AI 工具"></div>
      <div class="form-group"><label>简介</label><textarea id="mToolDesc" placeholder="工具简介"></textarea></div>
      <div class="form-group">
        <label>图标 / 封面</label>
        <div class="upload-zone" id="toolUploadZone">
          <input type="file" id="toolFileInput" accept="image/*" style="display:none;">
          <div class="upload-icon">&#8679;</div>
          <div class="upload-text">拖拽图片到此处，或 <strong>点击上传</strong></div>
          <div class="upload-hint">支持 JPG、PNG、GIF、WebP（最大 10MB）</div>
          <img class="upload-preview" id="toolPreview" alt="">
          <button class="upload-remove" id="toolUploadRemove" onclick="removeToolUpload(event)">×</button>
          <div class="upload-loading"><div class="upload-spinner"></div></div>
        </div>
      </div>
      <div class="form-group">
        <label>或粘贴图标链接</label>
        <input type="text" id="mToolImageUrl" placeholder="https://example.com/icon.png（粘贴图片链接，可替代文件上传）" style="width:100%;padding:8px 12px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;font-size:13px;">
        <div style="font-size:11px;color:rgba(0,0,0,0.4);margin-top:4px;">推荐图床：imgbb.com（免费）｜ 粘贴后图标将使用此链接</div>
      </div>
      <div class="form-group"><label>链接</label><input id="mToolLink" placeholder="工具网址（可选）"></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-submit" onclick="saveTool()">保存</button>
      </div>
    `;
    const zone = document.getElementById('toolUploadZone');
    const fileInput = document.getElementById('toolFileInput');
    zone.addEventListener('click', function(e) {
      if (e.target.closest('.upload-remove')) return;
      fileInput.click();
    });
    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); zone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleToolFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', function() {
      if (fileInput.files.length > 0) handleToolFile(fileInput.files[0]);
    });
    if (id) {
      api('GET', '/api/tools').then(tools => {
        const t = tools.find(x => x.id === id);
        if (t) {
          document.getElementById('mToolName').value = t.name || '';
          document.getElementById('mToolCategory').value = t.category || '';
          document.getElementById('mToolDesc').value = t.description || '';
          document.getElementById('mToolImageUrl').value = t.icon || '';
          document.getElementById('mToolLink').value = t.link || '';
          if (t.icon) { toolUploadedUrl = t.icon; showToolPreview(t.icon); }
        }
      });
    }
    document.getElementById('modalOverlay').classList.add('active');
  };

  window.editTool = function(id) { openToolModal(id); };

  window.saveTool = async function() {
    const imgUrl = document.getElementById('mToolImageUrl').value.trim();
    const data = {
      name: document.getElementById('mToolName').value.trim(),
      category: document.getElementById('mToolCategory').value.trim(),
      description: document.getElementById('mToolDesc').value.trim(),
      icon: toolUploadedUrl || imgUrl || '',
      link: document.getElementById('mToolLink').value.trim()
    };
    if (!data.name) { showToast('请输入工具名称', 'error'); return; }
    try {
      if (editingToolId) {
        await api('PUT', '/api/tools?id=' + editingToolId, data);
        showToast('工具已更新', 'success');
      } else {
        await api('POST', '/api/tools', data);
        showToast('工具已添加', 'success');
      }
      closeModal(); loadTools(); loadStats();
    } catch(e) { showToast('保存失败', 'error'); }
  };

  window.deleteTool = async function(id) {
    if (!confirm('确定删除这个工具吗？')) return;
    try {
      await api('DELETE', '/api/tools?id=' + id);
      showToast('已删除', 'success'); loadTools(); loadStats();
    } catch(e) { showToast('删除失败', 'error'); }
  };

  function showToolPreview(url) {
    const zone = document.getElementById('toolUploadZone');
    if (!zone) return;
    const preview = document.getElementById('toolPreview');
    if (!preview) return;
    preview.src = url; zone.classList.add('has-file');
  }

  async function handleToolFile(file) {
    const zone = document.getElementById('toolUploadZone');
    if (!zone) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const allowed = ['jpg','jpeg','png','gif','webp','svg','ico'];
    if (!allowed.includes(ext)) { showToast('不支持的文件类型', 'error'); return; }
    if (file.size > 10*1024*1024) { showToast('文件不能超过 10MB', 'error'); return; }
    zone.classList.add('uploading');
    try {
      const url = await uploadFile(file);
      toolUploadedUrl = url; showToolPreview(url);
    } catch(e) { showToast('上传失败：' + (e.message || '未知错误'), 'error'); }
    finally { zone.classList.remove('uploading'); }
  }
  window.handleToolFile = handleToolFile;

  window.removeToolUpload = function(e) {
    e.stopPropagation();
    toolUploadedUrl = '';
    const zone = document.getElementById('toolUploadZone');
    if (zone) { zone.classList.remove('has-file'); const p = document.getElementById('toolPreview'); if(p){p.src='';p.style.display='none';} }
  };

  // ── Avatar (Digital Clone) ──
  let avatarData = {};

  async function loadAvatar() {
    try {
      avatarData = await api('GET', '/api/avatar');
    } catch(e) { avatarData = {}; }
    // Fill form
    document.getElementById('avatarName').value = avatarData.name || '';
    document.getElementById('avatarStatus').value = avatarData.statusText || '';
    document.getElementById('avatarImage').value = avatarData.avatar || '';
    document.getElementById('avatarWelcome').value = avatarData.welcomeMessage || '';
    // Render responses list
    renderResponsesList();
    // Render quick replies
    renderQuickRepliesList();
  }

  function renderResponsesList() {
    const list = document.getElementById('responsesList');
    const items = avatarData.responses || [];
    if (items.length === 0) {
      list.innerHTML = '<p style="color:rgba(26,26,46,0.25);font-size:13px;text-align:center;padding:16px;">暂无预设话术</p>';
      return;
    }
    list.innerHTML = items.map(function(r, i) {
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:10px;">'
        + '<span style="flex:1;font-size:13px;color:#1a1a2e;">' + escHtml(r) + '</span>'
        + '<button class="btn-delete" onclick="deleteResponse(' + i + ')" title="删除" style="min-width:auto;width:30px;height:30px;padding:0;font-size:14px;">&#10006;</button>'
        + '</div>';
    }).join('');
  }

  function renderQuickRepliesList() {
    const list = document.getElementById('quickRepliesList');
    const items = avatarData.quickReplies || [];
    if (items.length === 0) {
      list.innerHTML = '<p style="color:rgba(26,26,46,0.25);font-size:13px;">暂无快捷回复</p>';
      return;
    }
    list.innerHTML = items.map(function(r, i) {
      return '<span style="display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:20px;font-size:12.5px;font-weight:500;color:#1a1a2e;">'
        + escHtml(r)
        + '<button onclick="deleteQuickReply(' + i + ')" style="background:none;border:none;cursor:pointer;color:rgba(26,26,46,0.3);font-size:14px;line-height:1;padding:0;margin-left:2px;" title="删除">&#10006;</button>'
        + '</span>';
    }).join('');
  }

  window.saveAvatarConfig = async function() {
    const payload = {
      name: document.getElementById('avatarName').value.trim(),
      statusText: document.getElementById('avatarStatus').value.trim(),
      avatar: document.getElementById('avatarImage').value.trim(),
      welcomeMessage: document.getElementById('avatarWelcome').value.trim(),
      responses: avatarData.responses || [],
      quickReplies: avatarData.quickReplies || []
    };
    try {
      await api('PUT', '/api/avatar', payload);
      avatarData = payload;
      showToast('保存成功', 'success');
    } catch(e) { showToast('保存失败：' + (e.message || '未知错误'), 'error'); }
  };

  window.addResponse = function() {
    const input = document.getElementById('newResponseInput');
    const text = input.value.trim();
    if (!text) return;
    if (!avatarData.responses) avatarData.responses = [];
    avatarData.responses.push(text);
    input.value = '';
    renderResponsesList();
    // Auto-save
    saveAvatarConfig();
  };

  window.deleteResponse = function(index) {
    if (!confirm('确定删除这条话术吗？')) return;
    avatarData.responses.splice(index, 1);
    renderResponsesList();
    saveAvatarConfig();
  };

  window.addQuickReply = function() {
    const input = document.getElementById('newQuickReplyInput');
    const text = input.value.trim();
    if (!text) return;
    if (!avatarData.quickReplies) avatarData.quickReplies = [];
    avatarData.quickReplies.push(text);
    input.value = '';
    renderQuickRepliesList();
    saveAvatarConfig();
  };

  window.deleteQuickReply = function(index) {
    avatarData.quickReplies.splice(index, 1);
    renderQuickRepliesList();
    saveAvatarConfig();
  };

  // ── Contact ──
  let contactData = {};
  async function loadContact() {
    const form = document.getElementById('contactForm');
    try {
      contactData = await api('GET', '/api/contact');
      const channels = contactData || {};
      let html = '';
      if (channels.wechat) {
        html += '<div class="qr-upload-row"><span class="ci-label">微信</span><div class="ci-value">'
          + '<button class="qr-upload-btn" onclick="uploadContactQR(\'wechat\')">&#8679; 上传二维码</button>'
          + '<img class="qr-preview' + (channels.wechat.qr ? ' show' : '') + '" id="qrPreview-wechat" src="' + escHtml(channels.wechat.qr || '') + '" alt="">'
          + (!channels.wechat.qr ? '<span class="qr-no-img">未上传</span>' : '')
          + '</div></div>';
      }
      if (channels.xiaohongshu) {
        html += '<div class="qr-upload-row"><span class="ci-label">小红书</span><div class="ci-value">'
          + '<button class="qr-upload-btn" onclick="uploadContactQR(\'xiaohongshu\')">&#8679; 上传二维码</button>'
          + '<img class="qr-preview' + (channels.xiaohongshu.qr ? ' show' : '') + '" id="qrPreview-xiaohongshu" src="' + escHtml(channels.xiaohongshu.qr || '') + '" alt="">'
          + (!channels.xiaohongshu.qr ? '<span class="qr-no-img">未上传</span>' : '')
          + '</div></div>';
      }
      if (channels.wechat_official) {
        html += '<div class="qr-upload-row"><span class="ci-label">微信公众号</span><div class="ci-value">'
          + '<button class="qr-upload-btn" onclick="uploadContactQR(\'wechat_official\')">&#8679; 上传二维码</button>'
          + '<img class="qr-preview' + (channels.wechat_official.qr ? ' show' : '') + '" id="qrPreview-wechat_official" src="' + escHtml(channels.wechat_official.qr || '') + '" alt="">'
          + (!channels.wechat_official.qr ? '<span class="qr-no-img">未上传</span>' : '')
          + '</div></div>';
      }
      if (channels.email) {
        html += '<div class="qr-upload-row"><span class="ci-label">邮箱</span><div class="ci-value">'
          + '<input id="cEmail" value="' + escHtml(channels.email.value || '') + '" placeholder="邮箱地址" style="flex:1;padding:8px 12px;border:1.5px solid rgba(0,0,0,0.1);border-radius:6px;font-size:13px;outline:none;">'
          + '</div></div>';
      }
      form.innerHTML = html;
    } catch(e) {
      form.innerHTML = '<p style="color:rgba(26,26,46,0.35);">加载失败</p>';
    }
  }
  window.loadContact = loadContact;

  window.uploadContactQR = function(channel) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async function() {
      const file = input.files[0];
      if (!file) return;
      try {
        showToast('上传中...', 'success');
        const url = await uploadFile(file);
        if (!contactData[channel]) contactData[channel] = {};
        contactData[channel].qr = url;
        // Update preview
        const preview = document.getElementById('qrPreview-' + channel);
        if (preview) {
          preview.src = url;
          preview.classList.add('show');
        }
        // Remove "未上传" text
        const row = preview?.parentElement;
        if (row) {
          const noImg = row.querySelector('.qr-no-img');
          if (noImg) noImg.remove();
        }
        // Auto-save
        await api('PUT', '/api/contact', contactData);
        showToast('二维码已上传并保存', 'success');
      } catch(e) {
        showToast('上传失败：' + (e.message || '未知错误'), 'error');
      }
    };
    input.click();
  };

  window.saveContact = async function() {
    const data = { ...contactData };
    if (data.email) {
      const emailInput = document.getElementById('cEmail');
      if (emailInput) data.email.value = emailInput.value || '';
    }
    try {
      await api('PUT', '/api/contact', data);
      contactData = data;
      showToast('联系方式已保存', 'success');
    } catch(e) {
      showToast('保存失败', 'error');
    }
  };

  // ── Change Password ──
  window.changePassword = async function() {
    const oldPwd = document.getElementById('oldPwd').value;
    const newPwd = document.getElementById('newPwd').value;
    const confirmPwd = document.getElementById('confirmPwd').value;
    if (!oldPwd || !newPwd || !confirmPwd) { showToast('请填写所有字段', 'error'); return; }
    if (newPwd !== confirmPwd) { showToast('两次密码不一致', 'error'); return; }
    if (newPwd.length < 6) { showToast('新密码至少 6 位', 'error'); return; }
    try {
      const res = await api('POST', '/api/change-password', { oldPassword: oldPwd, newPassword: newPwd });
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('密码已修改', 'success');
      document.getElementById('oldPwd').value = '';
      document.getElementById('newPwd').value = '';
      document.getElementById('confirmPwd').value = '';
    } catch(e) {
      showToast('修改失败', 'error');
    }
  };

  // ── Modal ──
  window.closeModal = function() {
    document.getElementById('modalOverlay').classList.remove('active');
  };

  // ── File Upload ──
  async function uploadFile(file) {
    const formData = new FormData();
    formData.append('file', file);
    const token = getToken();
    const res = await fetch(API + '/api/upload', {
      method: 'POST',
      headers: token ? { 'Authorization': 'Bearer ' + token } : {},
      body: formData
    });
    if (res.status === 401) {
      handleUnauthorized();
      throw new Error('未登录或登录已过期');
    }
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    return json.url;
  }

  function showWorkPreview(url) {
    const zone = document.getElementById('workUploadZone');
    if (!zone) return;
    const imgPreview = document.getElementById('workPreview');
    const videoPreview = document.getElementById('workVideoPreview');
    const isVideo = /\.(mp4|webm)$/i.test(url);
    if (isVideo) {
      imgPreview.style.display = 'none';
      videoPreview.style.display = 'block';
      videoPreview.src = url;
    } else {
      imgPreview.style.display = 'block';
      videoPreview.style.display = 'none';
      imgPreview.src = url;
    }
    zone.classList.add('has-file');
  }

  async function handleWorkFile(file) {
    const zone = document.getElementById('workUploadZone');
    if (!zone) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const allowed = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'mp4', 'webm'];
    if (!allowed.includes(ext)) {
      showToast('不支持的文件类型', 'error');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showToast('文件不能超过 10MB', 'error');
      return;
    }
    zone.classList.add('uploading');
    try {
      const url = await uploadFile(file);
      workUploadedUrl = url;
      showWorkPreview(url);
    } catch(e) {
      showToast('上传失败：' + (e.message || '未知错误'), 'error');
    } finally {
      zone.classList.remove('uploading');
    }
  }
  window.handleWorkFile = handleWorkFile;

  window.removeWorkUpload = function(e) {
    e.stopPropagation();
    workUploadedUrl = '';
    const zone = document.getElementById('workUploadZone');
    if (zone) {
      zone.classList.remove('has-file');
      const imgPreview = document.getElementById('workPreview');
      const videoPreview = document.getElementById('workVideoPreview');
      if (imgPreview) { imgPreview.src = ''; imgPreview.style.display = 'none'; }
      if (videoPreview) { videoPreview.src = ''; videoPreview.style.display = 'none'; }
    }
  };

  // ── Article Image Upload ──
  function showArticlePreview(url) {
    const zone = document.getElementById('articleUploadZone');
    if (!zone) return;
    const preview = document.getElementById('articlePreview');
    if (!preview) return;
    preview.src = url;
    zone.classList.add('has-file');
  }

  async function handleArticleFile(file) {
    const zone = document.getElementById('articleUploadZone');
    if (!zone) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const allowed = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'];
    if (!allowed.includes(ext)) {
      showToast('不支持的文件类型，仅支持图片', 'error');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showToast('文件不能超过 10MB', 'error');
      return;
    }
    zone.classList.add('uploading');
    try {
      const url = await uploadFile(file);
      articleUploadedUrl = url;
      showArticlePreview(url);
    } catch(e) {
      showToast('上传失败：' + (e.message || '未知错误'), 'error');
    } finally {
      zone.classList.remove('uploading');
    }
  }
  window.handleArticleFile = handleArticleFile;

  window.removeArticleUpload = function(e) {
    e.stopPropagation();
    articleUploadedUrl = '';
    const zone = document.getElementById('articleUploadZone');
    if (zone) {
      zone.classList.remove('has-file');
      const preview = document.getElementById('articlePreview');
      if (preview) { preview.src = ''; preview.style.display = 'none'; }
    }
  };

  // ── HTML Escape ──
  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Auto-login check（验证 token 是否仍有效） ──
  if (getToken()) {
    fetch(API + '/api/check-auth', {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    }).then(res => {
      if (res.ok) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('adminLayout').classList.add('active');
        loadAll();
      } else {
        clearToken();
      }
    }).catch(() => {
      clearToken();
    });
  }
})();
</script>
</body>
</html>
